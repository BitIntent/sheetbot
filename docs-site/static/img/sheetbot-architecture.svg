<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SheetBot 系统架构图</title>
  <desc id="desc">展示 SheetBot 的分层架构：接入与部署、前端工作台、后端业务模块、AI Harness Engineering 执行护栏、数据与外部系统，体现把大模型输出约束为确定性操作的工程能力。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f46e5"/>
    </marker>
    <style>
      .title      { font: 700 28px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #0b1f3a; }
      .subtitle   { font: 400 14px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #5b6b7f; }
      .layer-tag  { font: 700 13px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #33415c; letter-spacing: 1px; }
      .layer-sub  { font: 400 12px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #7c8aa0; }
      .box-title  { font: 600 13.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #1e293b; }
      .box-text   { font: 400 11.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #5b6b7f; }
      .hl-title   { font: 700 13.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #312e81; }
      .hl-text    { font: 400 11.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #4c4f9e; }
      .dark-title { font: 700 14px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .dark-text  { font: 400 11.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #c7d2fe; }
      .note       { font: 400 12.5px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #44546a; }
      .flow-label { font: 600 11px "Segoe UI", "Microsoft YaHei", Arial, sans-serif; fill: #4f46e5; }
      .layer-box  { fill: #ffffff; stroke: #d4dbe6; stroke-width: 1; }
      .node       { fill: #f8fafc; stroke: #9fb0c6; stroke-width: 1; }
      .node-fe    { fill: #f3f7fb; stroke: #8aa6c8; stroke-width: 1; }
      .node-be    { fill: #f2f6fa; stroke: #7e9cc0; stroke-width: 1; }
      .node-data  { fill: #f6f8fa; stroke: #a3b1c2; stroke-width: 1; }
      .node-hl    { fill: #ffffff; stroke: #6366f1; stroke-width: 1.4; }
      .line       { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .line-hl    { stroke: #4f46e5; stroke-width: 1.8; fill: none; marker-end: url(#arrowAccent); }
    </style>
  </defs>

  <rect width="1200" height="860" fill="#fbfcfe"/>
  <rect x="0" y="0" width="1200" height="6" fill="#0b1f3a"/>

  <text x="40" y="52" class="title">SheetBot 系统架构</text>
  <text x="40" y="78" class="subtitle">分层架构 × AI Harness Engineering：将大模型能力约束为确定性、可校验、可审计的业务执行</text>

  <!-- ===================== L1 接入与部署层 ===================== -->
  <rect x="40" y="104" width="1120" height="86" rx="8" class="layer-box"/>
  <text x="60" y="128" class="layer-tag">接入与部署层</text>
  <rect x="60" y="142" width="246" height="34" rx="6" class="node"/>
  <text x="183" y="164" text-anchor="middle" class="box-title">Caddy / Nginx 反向代理</text>
  <rect x="338" y="142" width="246" height="34" rx="6" class="node"/>
  <text x="461" y="164" text-anchor="middle" class="box-title">静态资源托管</text>
  <rect x="616" y="142" width="246" height="34" rx="6" class="node"/>
  <text x="739" y="164" text-anchor="middle" class="box-title">API / SSE 网关</text>
  <rect x="894" y="142" width="246" height="34" rx="6" class="node"/>
  <text x="1017" y="164" text-anchor="middle" class="box-title">自托管 / 私有化部署</text>

  <!-- ===================== L2 前端工作台层 ===================== -->
  <rect x="40" y="208" width="1120" height="104" rx="8" class="layer-box"/>
  <text x="60" y="232" class="layer-tag">前端工作台层</text>
  <rect x="60" y="246" width="196" height="52" rx="6" class="node-fe"/>
  <text x="158" y="267" text-anchor="middle" class="box-title">React 主应用</text>
  <text x="158" y="285" text-anchor="middle" class="box-text">路由 / 状态 / 权限</text>
  <rect x="281" y="246" width="196" height="52" rx="6" class="node-fe"/>
  <text x="379" y="267" text-anchor="middle" class="box-title">Univer Canvas</text>
  <text x="379" y="285" text-anchor="middle" class="box-text">普通 Excel 编辑</text>
  <rect x="502" y="246" width="196" height="52" rx="6" class="node-fe"/>
  <text x="600" y="267" text-anchor="middle" class="box-title">PPTist 子系统</text>
  <text x="600" y="285" text-anchor="middle" class="box-text">在线汇报编辑</text>
  <rect x="723" y="246" width="196" height="52" rx="6" class="node-fe"/>
  <text x="821" y="267" text-anchor="middle" class="box-title">业务组件</text>
  <text x="821" y="285" text-anchor="middle" class="box-text">报表 / 表单 / 技能</text>
  <rect x="944" y="246" width="196" height="52" rx="6" class="node-fe"/>
  <text x="1042" y="267" text-anchor="middle" class="box-title">SSE 客户端</text>
  <text x="1042" y="285" text-anchor="middle" class="box-text">实时事件流</text>

  <!-- ===================== L3 后端业务模块层 ===================== -->
  <rect x="40" y="330" width="1120" height="104" rx="8" class="layer-box"/>
  <text x="60" y="354" class="layer-tag">后端业务模块层（FastAPI）</text>
  <rect x="60" y="368" width="196" height="52" rx="6" class="node-be"/>
  <text x="158" y="389" text-anchor="middle" class="box-title">auth / plans</text>
  <text x="158" y="407" text-anchor="middle" class="box-text">认证 · 套餐 · 配额</text>
  <rect x="281" y="368" width="196" height="52" rx="6" class="node-be"/>
  <text x="379" y="389" text-anchor="middle" class="box-title">agent</text>
  <text x="379" y="407" text-anchor="middle" class="box-text">普通模式 Agent</text>
  <rect x="502" y="368" width="196" height="52" rx="6" class="node-be"/>
  <text x="600" y="389" text-anchor="middle" class="box-title">large_file</text>
  <text x="600" y="407" text-anchor="middle" class="box-text">大文件 REST 管线</text>
  <rect x="723" y="368" width="196" height="52" rx="6" class="node-be"/>
  <text x="821" y="389" text-anchor="middle" class="box-title">report / pptx / batch_word</text>
  <text x="821" y="407" text-anchor="middle" class="box-text">报表 · 汇报 · 批量文档</text>
  <rect x="944" y="368" width="196" height="52" rx="6" class="node-be"/>
  <text x="1042" y="389" text-anchor="middle" class="box-title">collect / connect</text>
  <text x="1042" y="407" text-anchor="middle" class="box-text">表单 · 连接器</text>

  <!-- ===================== L4 AI Harness Engineering ===================== -->
  <rect x="40" y="452" width="1120" height="216" rx="8" fill="#f5f6ff" stroke="#4f46e5" stroke-width="1.6"/>
  <text x="60" y="478" class="layer-tag" fill="#312e81">AI HARNESS ENGINEERING · AI 执行护栏层</text>
  <text x="60" y="496" class="layer-sub">意图理解与确定性执行分离：LLM 只产出受约束的计划，最终操作由编译器与注册表确定性生成</text>

  <!-- Row A 意图理解 -->
  <rect x="60" y="510" width="340" height="52" rx="6" class="node-hl"/>
  <text x="230" y="531" text-anchor="middle" class="hl-title">Prompt Expander 指令扩展</text>
  <text x="230" y="549" text-anchor="middle" class="hl-text">元数据增强 · 不经过 LLM</text>
  <rect x="430" y="510" width="340" height="52" rx="6" fill="#312e81" stroke="#312e81"/>
  <text x="600" y="531" text-anchor="middle" class="dark-title">Claude Agent</text>
  <text x="600" y="549" text-anchor="middle" class="dark-text">意图理解 · 受限工具调用</text>
  <rect x="800" y="510" width="340" height="52" rx="6" class="node-hl"/>
  <text x="970" y="531" text-anchor="middle" class="hl-title">工具约束 submit_analysis_plan</text>
  <text x="970" y="549" text-anchor="middle" class="hl-text">分析任务唯一提交入口</text>

  <!-- Row A -> Row B -->
  <path class="line-hl" d="M600 562 L600 586"/>
  <text x="614" y="580" class="flow-label">plan（结构化计划）</text>

  <!-- Row B 确定性执行 -->
  <rect x="60" y="592" width="196" height="52" rx="6" class="node-hl"/>
  <text x="158" y="613" text-anchor="middle" class="hl-title">Plan Contract</text>
  <text x="158" y="631" text-anchor="middle" class="hl-text">计划契约 · Schema 校验</text>
  <rect x="281" y="592" width="196" height="52" rx="6" class="node-hl"/>
  <text x="379" y="613" text-anchor="middle" class="hl-title">Plan Compiler</text>
  <text x="379" y="631" text-anchor="middle" class="hl-text">plan → operations 确定性编译</text>
  <rect x="502" y="592" width="196" height="52" rx="6" class="node-hl"/>
  <text x="600" y="613" text-anchor="middle" class="hl-title">Operation Registry</text>
  <text x="600" y="631" text-anchor="middle" class="hl-text">70+ 操作单一真相源</text>
  <rect x="723" y="592" width="196" height="52" rx="6" class="node-hl"/>
  <text x="821" y="613" text-anchor="middle" class="hl-title">沙箱预览 / 回滚</text>
  <text x="821" y="631" text-anchor="middle" class="hl-text">Skill 沙箱 · 操作可撤销</text>
  <rect x="944" y="592" width="196" height="52" rx="6" class="node-hl"/>
  <text x="1042" y="613" text-anchor="middle" class="hl-title">QuotaGuard / JSON Guard</text>
  <text x="1042" y="631" text-anchor="middle" class="hl-text">配额护栏 · 输出修复兜底</text>

  <!-- ===================== L5 数据与外部系统层 ===================== -->
  <rect x="40" y="686" width="1120" height="104" rx="8" class="layer-box"/>
  <text x="60" y="710" class="layer-tag">数据与外部系统层</text>
  <rect x="60" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="140" y="745" text-anchor="middle" class="box-title">MySQL</text>
  <text x="140" y="763" text-anchor="middle" class="box-text">业务数据与配置</text>
  <rect x="244" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="324" y="745" text-anchor="middle" class="box-title">DuckDB</text>
  <text x="324" y="763" text-anchor="middle" class="box-text">大文件 OLAP</text>
  <rect x="428" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="508" y="745" text-anchor="middle" class="box-title">uploads</text>
  <text x="508" y="763" text-anchor="middle" class="box-text">UGC 文件分区</text>
  <rect x="612" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="692" y="745" text-anchor="middle" class="box-title">Claude API</text>
  <text x="692" y="763" text-anchor="middle" class="box-text">LLM 服务</text>
  <rect x="796" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="876" y="745" text-anchor="middle" class="box-title">SMTP</text>
  <text x="876" y="763" text-anchor="middle" class="box-text">认证邮件</text>
  <rect x="980" y="724" width="160" height="52" rx="6" class="node-data"/>
  <text x="1060" y="745" text-anchor="middle" class="box-title">第三方系统</text>
  <text x="1060" y="763" text-anchor="middle" class="box-text">Shopify / 钉钉 / 企微</text>

  <!-- ===================== 层间连线 ===================== -->
  <path class="line" d="M600 190 L600 208"/>
  <path class="line" d="M600 312 L600 330"/>
  <path class="line-hl" d="M600 434 L600 452"/>
  <path class="line" d="M600 668 L600 686"/>

  <!-- ===================== 底部说明 ===================== -->
  <rect x="40" y="806" width="1120" height="36" rx="6" fill="#eef1f7"/>
  <text x="60" y="829" class="note">普通模式：前端内存 + SSE 实时执行；大文件模式：服务端 DuckDB 管线。Harness 层保证相同输入产出稳定一致的操作序列，二种模式的模块与 API 严格隔离。</text>
</svg>
