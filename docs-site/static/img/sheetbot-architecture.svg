<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SheetBot 系统架构图</title>
  <desc id="desc">展示 SheetBot 从访问层、前端工作台、后端 API、AI 与执行引擎、数据与存储、外部服务到部署层的分层关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .layer-title { font: 700 16px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .tag { font: 700 11px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: white; }
      .line { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.4; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <text x="48" y="58" class="title">SheetBot 系统架构</text>
  <text x="48" y="84" class="subtitle">以 Excel 工作台为入口，连接 AI Agent、确定性执行引擎、业务模块与外部系统</text>

  <rect x="48" y="116" width="1104" height="74" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="72" y="146" class="layer-title">访问与部署层</text>
  <rect x="220" y="132" width="190" height="36" rx="12" fill="#e0f2fe"/>
  <text x="240" y="155" class="box-title">Caddy / Nginx</text>
  <rect x="440" y="132" width="190" height="36" rx="12" fill="#e0f2fe"/>
  <text x="460" y="155" class="box-title">静态资源托管</text>
  <rect x="660" y="132" width="210" height="36" rx="12" fill="#e0f2fe"/>
  <text x="680" y="155" class="box-title">API / SSE 反向代理</text>
  <rect x="900" y="132" width="210" height="36" rx="12" fill="#e0f2fe"/>
  <text x="920" y="155" class="box-title">自托管 / 私有化</text>

  <rect x="48" y="222" width="1104" height="118" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="72" y="252" class="layer-title">前端工作台层</text>
  <rect x="220" y="244" width="160" height="64" rx="14" fill="#dbeafe"/>
  <text x="240" y="269" class="box-title">React App</text>
  <text x="240" y="290" class="box-text">路由 / 状态 / 权限</text>
  <rect x="405" y="244" width="170" height="64" rx="14" fill="#dcfce7"/>
  <text x="425" y="269" class="box-title">Univer Canvas</text>
  <text x="425" y="290" class="box-text">普通 Excel 编辑</text>
  <rect x="600" y="244" width="170" height="64" rx="14" fill="#fef3c7"/>
  <text x="620" y="269" class="box-title">PPTist 子系统</text>
  <text x="620" y="290" class="box-text">在线汇报编辑</text>
  <rect x="795" y="244" width="170" height="64" rx="14" fill="#fae8ff"/>
  <text x="815" y="269" class="box-title">业务组件</text>
  <text x="815" y="290" class="box-text">报表 / 表单 / 技能</text>
  <rect x="990" y="244" width="120" height="64" rx="14" fill="#e2e8f0"/>
  <text x="1010" y="269" class="box-title">SSE</text>
  <text x="1010" y="290" class="box-text">实时事件</text>

  <rect x="48" y="372" width="1104" height="154" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="72" y="402" class="layer-title">后端 API 与业务模块层</text>
  <rect x="220" y="410" width="144" height="72" rx="14" fill="#dbeafe"/>
  <text x="240" y="435" class="box-title">auth / plans</text>
  <text x="240" y="456" class="box-text">认证、套餐、配额</text>
  <rect x="384" y="410" width="144" height="72" rx="14" fill="#dcfce7"/>
  <text x="404" y="435" class="box-title">agent</text>
  <text x="404" y="456" class="box-text">普通模式 Agent</text>
  <rect x="548" y="410" width="144" height="72" rx="14" fill="#cffafe"/>
  <text x="568" y="435" class="box-title">large_file</text>
  <text x="568" y="456" class="box-text">大文件 REST 管线</text>
  <rect x="712" y="410" width="144" height="72" rx="14" fill="#fef3c7"/>
  <text x="732" y="435" class="box-title">report / pptx</text>
  <text x="732" y="456" class="box-text">报表与汇报</text>
  <rect x="876" y="410" width="144" height="72" rx="14" fill="#fae8ff"/>
  <text x="896" y="435" class="box-title">collect / connect</text>
  <text x="896" y="456" class="box-text">收集与连接器</text>

  <rect x="48" y="558" width="532" height="126" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="72" y="588" class="layer-title">AI 与执行引擎层</text>
  <rect x="78" y="610" width="144" height="46" rx="14" fill="url(#purple)"/>
  <text x="100" y="639" class="tag">Claude Agent</text>
  <rect x="242" y="610" width="144" height="46" rx="14" fill="#e0e7ff"/>
  <text x="262" y="638" class="box-title">计划编译器</text>
  <rect x="406" y="610" width="144" height="46" rx="14" fill="#e0e7ff"/>
  <text x="426" y="638" class="box-title">操作注册表</text>

  <rect x="620" y="558" width="532" height="126" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="644" y="588" class="layer-title">数据、文件与外部系统层</text>
  <rect x="650" y="610" width="120" height="46" rx="14" fill="#fee2e2"/>
  <text x="676" y="638" class="box-title">MySQL</text>
  <rect x="790" y="610" width="120" height="46" rx="14" fill="#ccfbf1"/>
  <text x="816" y="638" class="box-title">DuckDB</text>
  <rect x="930" y="610" width="92" height="46" rx="14" fill="#f1f5f9"/>
  <text x="954" y="638" class="box-title">uploads</text>
  <rect x="1040" y="610" width="82" height="46" rx="14" fill="#f1f5f9"/>
  <text x="1058" y="638" class="box-title">SMTP</text>

  <path class="line" d="M600 190 L600 222"/>
  <path class="line" d="M600 340 L600 372"/>
  <path class="line" d="M470 526 L314 558"/>
  <path class="line" d="M720 526 L886 558"/>
  <path class="soft-line" d="M478 482 C478 530, 250 530, 150 610"/>
  <path class="soft-line" d="M620 482 C620 530, 825 530, 850 610"/>
  <path class="soft-line" d="M948 482 C980 530, 1080 540, 1082 610"/>

  <rect x="48" y="704" width="1104" height="34" rx="12" fill="#eff6ff"/>
  <text x="72" y="726" class="subtitle">普通模式由前端内存 + SSE 实时执行；大文件模式由服务端 DuckDB 管线处理。二者模块和 API 严格隔离。</text>
</svg>
